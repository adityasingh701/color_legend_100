<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Legend 100</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Top Bar -->
    <div class="topbar">
        <div>🏆 <span id="currentLevel">1</span></div>
        <div>❤️ <span id="lives">5</span></div>
        <div>🪙 <span id="coins">200</span></div>
        <div>⭐ <span id="rank">Beginner</span></div>
        <div>⏱ <span id="timer">00:00</span></div>
    </div>

    <!-- ================= HOME PAGE ================= -->

    <div id="homePage" class="page">

        <div class="logo">COLOR LEGEND 100</div>

        <button class="btn" onclick="continueGame()">
            ▶ Continue
        </button>

        <button class="btn" onclick="openLevels()">
            📚 Levels
        </button>

        <button class="btn" onclick="openShop()">
            🪙 Redeem Coins
        </button>

        <button class="btn" onclick="location.href='contacts.html'">
            📧 Contact
        </button>

        <button class="btn" onclick="claimDailyReward()">
            🎁 Daily Reward
        </button>

        <div class="card">
            <h3>🏆 Leaderboard</h3>

            <p>
                Highest Level :
                <span id="highestLevel">1</span>
            </p>

        </div>

    </div>

    <!-- ================= GAME PAGE ================= -->

    <div id="gamePage" class="page hidden">

        <!-- NEW BACK BUTTON -->
        <button class="btn back-btn" onclick="goHome()">
             Back Home
        </button>

        <h2 id="levelTitle">
            Level 1
        </h2>

        <button class="btn" onclick="useHint()">
            💡 Hint
        </button>

        <div id="grid"></div>

    </div>

    <!-- ================= LEVEL PAGE ================= -->

    <div id="levelsPage" class="page hidden">

        <h2>Levels</h2>

        <div id="levelGrid" class="level-grid"></div>

        <button class="btn" onclick="goHome()">
            Back
        </button>

    </div>

    <!-- ================= SHOP PAGE ================= -->

    <div id="shopPage" class="page hidden">

        <h2>Buy Coins</h2>

        <div class="card">

            <h3>50 Coins = INR 5</h3>

            <br>

            <h4>
                Contact me for payment details
                <a href="contacts.html">
                    <b>Check Out.</b>
                </a>
            </h4>

            <br>

            <input
                id="redeemInput"
                placeholder="Redeem Code"
            >

            <br><br>

            <button
                class="btn"
                onclick="redeemCode()">

                Redeem

            </button>

            <button
                class="btn"
                onclick="buyLife()">

                ❤️ Buy 1 Life (20 Coins)

            </button>

        </div>

        <button
            class="btn"
            onclick="goHome()">

            Back

        </button>

    </div>

    <!-- ================= TROPHY PAGE ================= -->

    <div id="trophyPage" class="page hidden">

        <div class="trophy">
            👑
        </div>

        <h1>
            LEGEND PLAYER
        </h1>

        <br>

        <p>
            You completed all 100 levels.
            Contact us for your prize money (₹50)
        </p>

        <br>

        <button
            class="btn"
            onclick="goHome()">

            Home

        </button>

    </div>

    <!-- JavaScript -->
    <script src="script.js"></script>

</body>
</html>
